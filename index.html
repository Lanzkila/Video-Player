<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Kirin Player V6 | GitHub</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    
    <style>
        body, html { margin:0; padding:0; height:100%; background:#000; font-family:sans-serif; overflow-x:hidden; color:#fff; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #007bff; border-radius: 10px; }

        .app-wrapper { display:flex; flex-direction:column; min-height:100vh; position:relative; }
        
        /* Navigation */
        .uc-nav { flex-shrink:0; display:flex; align-items:center; background:#111; padding:8px 15px; gap:10px; border-bottom:1px solid #222; height:56px; z-index:1000; position:sticky; top:0; }
        .uc-input-container { flex:1; background:#222; border-radius:25px; padding:0 15px; display:flex; align-items:center; border:1px solid #333; gap:10px; height:38px; }
        input#videoUrl { flex:1; background:transparent; border:none; color:#fff; font-size:14px; outline:none; height:100%; }
        .btn-action { background:#007bff; color:#fff; border:none; width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }

        /* Mode Switcher */
        .mode-box { padding:12px; background:#000; display:flex; justify-content:center; gap:12px; border-bottom: 1px solid #222; }
        .m-btn { background:#1a1a1a; border:1px solid #333; color:#888; padding:8px 16px; border-radius:20px; font-size:11px; cursor:pointer; font-weight:bold; transition: 0.3s; }
        .m-btn.active { background:#007bff; color:#fff; border-color:#007bff; }

        /* Player Stage */
        .player-stage { display: flex; flex-direction: column; align-items: center; width: 100%; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .video-slot { 
            position: relative; width: 100%; max-width: 900px; margin: 0 auto 20px auto; 
            aspect-ratio: 16/9; background: #000; border: 1px solid #222; 
            border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Grid Layouts */
        .grid-mode { 
            display: grid !important; grid-template-columns: 1fr 1fr; gap: 15px; 
            width: 95% !important; max-width: 1200px !important; margin: 10px auto !important; 
        }
        .grid-mode .video-slot { margin: 0 !important; max-width: 100% !important; border-radius: 10px; }

        iframe { width:100%; height:100%; border:none; }
        .uc-footer { background:#111; padding:20px; text-align:center; font-size:11px; color:#555; border-top:1px solid #222; margin-top: auto; }

        @media (max-width: 850px) { 
            .grid-mode { grid-template-columns: 1fr !important; } 
            .video-slot { border-radius: 0; } 
        }
    </style>
</head>

<body>
  <div class="app-wrapper">
    <div class="uc-nav">
      <div class="uc-input-container">
        <input id="videoUrl" placeholder="Paste Link (YT, Twitch, Bili, Kick, MP4)..." type="text">
        <span onclick="document.getElementById('videoUrl').value=''" style="color:#555; cursor:pointer; font-size:20px;">&#215;</span>
      </div>
      <button class="btn-action" onclick="prosesLink()">&#9654;</button>
    </div>

    <div class="mode-box">
        <button class="m-btn active" id="btn1" onclick="switchLayout('single')">1 SCREEN</button>
        <button class="m-btn" id="btn2" onclick="switchLayout('dual')">2 SCREEN</button>
        <button class="m-btn" id="btn4" onclick="switchLayout('quad')">4 SCREEN</button>
    </div>

    <div class="player-stage" id="mainStage">
      <div class="video-slot" id="slotA">
        <div id="vjs-eng" style="display:none; width:100%; height:100%;">
          <video id="my-video" class="video-js vjs-big-play-centered" controls playsinline preload="auto"></video>
        </div>
        <div id="ifrm-A" style="width:100%; height:100%;"></div>
      </div>
      <div class="video-slot" id="slotB" style="display:none;"><div id="ifrm-B" style="width:100%; height:100%;"></div></div>
      <div class="video-slot" id="slotC" style="display:none;"><div id="ifrm-C" style="width:100%; height:100%;"></div></div>
      <div class="video-slot" id="slotD" style="display:none;"><div id="ifrm-D" style="width:100%; height:100%;"></div></div>
    </div>

    <div class="uc-footer">
      &#169; <span id="currentYear"></span> Kirin Player | All Rights Reserved.
    </div>
  </div>

  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

  <script>
    document.getElementById('currentYear').textContent = new Date().getFullYear();
    
    // Inisial Video.js
    var player = videojs('my-video', { fill: true });
    let slotIndex = 0;

    // Enter Key
    document.getElementById('videoUrl').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') prosesLink();
    });

    // Space Key untuk Play/Pause MP4
    window.addEventListener('keydown', function(e) {
        if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {
            e.preventDefault();
            if (!player.paused()) { player.pause(); } else { player.play(); }
        }
    });

    function switchLayout(mode) {
        const stage = document.getElementById('mainStage');
        slotIndex = 0; // Reset ke slot pertama bila tukar layout
        stage.classList.remove('grid-mode');
        
        if(mode !== 'single') stage.classList.add('grid-mode');

        document.getElementById('slotB').style.display = (mode === 'dual' || mode === 'quad') ? 'block' : 'none';
        document.getElementById('slotC').style.display = (mode === 'quad') ? 'block' : 'none';
        document.getElementById('slotD').style.display = (mode === 'quad') ? 'block' : 'none';

        document.querySelectorAll('.m-btn').forEach(btn => btn.classList.remove('active'));
        if(mode === 'single') document.getElementById('btn1').classList.add('active');
        if(mode === 'dual') document.getElementById('btn2').classList.add('active');
        if(mode === 'quad') document.getElementById('btn4').classList.add('active');
    }

    function getHTML(link) {
        var domain = window.location.hostname; // Automatik ambil domain GitHub Pages
        
        if (link.includes("youtube.com") || link.includes("youtu.be")) {
            var ytId = link.includes("v=") ? link.split('v=')[1].split('&')[0] : link.split("/").pop().split("?")[0];
            return `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
        } 

        if (link.includes("tiktok.com")) {
            let ttId = link.split("/video/")[1]?.split("?")[0];
            return `<iframe src="https://www.tiktok.com/embed/v2/${ttId}" allow="fullscreen"></iframe>`;
        }
        
        if (link.includes("twitch.tv")) {
            let twId = link.split("/").pop().split("?")[0];
            // Fix Parent untuk GitHub Pages
            return `<iframe src="https://player.twitch.tv/?channel=${twId}&parent=${domain}&autoplay=true&muted=false" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
        }
        if (link.includes("bilibili.com")) {
            // Bilibili Iframe Fix
            let bvid = link.includes("/video/") ? link.split('/video/')[1].split('/')[0].split('?')[0] : "";
            return `<iframe src="//player.bilibili.com/player.html?bvid=${bvid}&page=1&high_quality=1&danmaku=0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
        }
        if (link.includes("kick.com")) {
            let kickId = link.split("/").pop().split("?")[0];
            return `<iframe src="https://player.kick.com/${kickId}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
        }
        if (link.includes("drive.google.com")) {
            let driveId = link.split("/d/")[1].split("/")[0];
            return `<iframe src="https://drive.google.com/file/d/${driveId}/preview"></iframe>`;
        }
        
        // Default Iframe
        return `<iframe src="${link}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
    }

    function prosesLink() {
        var url = document.getElementById('videoUrl').value.trim();
        if(!url) return;
        
        const targets = ['ifrm-A', 'ifrm-B', 'ifrm-C', 'ifrm-D'];
        let maxSlots = document.getElementById('slotD').style.display === 'block' ? 4 : (document.getElementById('slotB').style.display === 'block' ? 2 : 1);

        // --- LOGIK BARU: Check MP4 atau M3U8 (HLS) ---
        const isVideoFile = url.toLowerCase().endsWith(".mp4") || 
                            url.includes(".mp4?") || 
                            url.toLowerCase().endsWith(".m3u8") || 
                            url.includes(".m3u8?");

        if(slotIndex === 0 && isVideoFile) {
            document.getElementById('ifrm-A').style.display = 'none';
            document.getElementById('vjs-eng').style.display = 'block';
            
            // Tentukan type: kalau m3u8 guna application/x-mpegURL
            let type = url.includes(".m3u8") ? 'application/x-mpegURL' : 'video/mp4';
            
            player.src({ src: url, type: type });
            player.play();
        } else {
            // Jika bukan video file atau bukan slot A, guna Iframe macam biasa
            if(slotIndex === 0) { 
                document.getElementById('vjs-eng').style.display = 'none'; 
                player.pause(); 
                document.getElementById('ifrm-A').style.display = 'block'; 
            }
            document.getElementById(targets[slotIndex]).innerHTML = getHTML(url);
        }

        slotIndex = (slotIndex + 1) % maxSlots;
        document.getElementById('videoUrl').value = '';
        document.getElementById('videoUrl').blur();
    }
  </script>
</body>
</html>
